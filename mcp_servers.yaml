# External MCP server configurations for ScholarAgent.
# The agent connects to each server and discovers its tools automatically.
#
# Format per server:
#   transport: stdio (only transport supported currently)
#   command:   executable to launch
#   args:      command-line arguments
#   cwd:       working directory (optional, defaults to project root)
#   env:       environment variables (optional)
#   timeout:   connection timeout in seconds (optional, default 30)

servers:
  # Example: MATLAB MCP server
  # matlab:
  #   transport: stdio
  #   command: ${MATLAB_MCP_PYTHON_EXECUTABLE}
  #   args: ["${MATLAB_MCP_SERVER_PATH}"]
  #   timeout: 30

  # Example: GitHub MCP server
  # github:
  #   transport: stdio
  #   command: npx
  #   args: ["-y", "@anthropic/mcp-github"]
  #   timeout: 30
